[Config]
; Accuracy value (0-100). Lower = more weapon spread for NPCs.
; The game computes spread from: 100 - Accuracy
; So Accuracy=60 gives spread_factor=40, Accuracy=20 gives spread_factor=80
Accuracy=0

; SpreadMultiplier: NPC spread intensity. Higher = more spray.
; This replaces the game's broken skill-accumulator multiplication.
; 1.0 = default, 2.0-5.0 = heavy spread, 0.5 = tighter spread
SpreadMultiplier=10.0

; PlayerSpread: Player weapon spread constant. Higher = more spray for the player.
; The player's instant-hit weapons use this in: angle_offset = rng * PlayerSpread
;   0.001 = ~3.7 deg max spread (very tight)
;   0.003 = ~11 deg max spread (moderate, default)
;   0.005 = ~18 deg max spread (noticeable spray)
;   0.010 = ~37 deg max spread (heavy spray)
;   0.020 = ~73 deg max spread (extreme)
; NOTE: This affects accuracy accumulation for FUTURE shots. Use SpreadDegrees
; for per-shot hit-detection spread control.
PlayerSpread=0.05

; SpreadDegrees: angular cone applied to each bullet's direction vector before
; the hit-detection trace runs. This affects BOTH damage and visual tracers.
; The game's own spread is controlled by PlayerSpread (accuracy accumulation) and
; the weapon data table; this adds a configurable angular scatter on top.
;   0.0 = no extra spread
;   1.0 = ~1 deg cone
;   3.0 = ~3 deg cone (default, noticeable spray)
;   5.0 = ~5 deg cone (heavy spray)
;   10.0 = ~10 deg cone (extreme)
SpreadDegrees=3.0

; MinSpreadUnits: minimum visible lateral spread for very short close-range traces.
; This prevents near-wall shots from collapsing to effectively pinpoint accuracy.
MinSpreadUnits=0.35

; NoTargetDistance: when the game reports no hit target, synthesize a far trace endpoint
; so the same spread logic still runs while aiming into open sky.
NoTargetDistance=120.0

; PoliceIgnore: 1 prevents crimes from increasing wanted stars.
; Existing stars are not cleared; this only blocks new wanted-point gains.
PoliceIgnore=1

; InfiniteAmmo: 1 keeps reserve ammo from decreasing.
; Current clip ammo still drains, so normal reload timing is preserved.
InfiniteAmmo=1 

; TraceLogShots: number of final trace calls to log for validation.
; Set to 0 once behavior is tuned.
TraceLogShots=80
